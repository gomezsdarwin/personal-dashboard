<!-- Micro-interactions Script -->
<script>
        // Toggle habit squares
        document.querySelectorAll('.habit-square').forEach(square => {
            square.addEventListener('click', function(e) {
                e.stopPropagation();
                this.classList.toggle('active');
            });
        });

        // Simple task completion toggle
        document.querySelectorAll('.task-item').forEach(item => {
            item.addEventListener('click', function() {
                const text = this.querySelector('span:last-child');
                const box = this.querySelector('div');
                
                if (text.classList.contains('line-through')) {
                    text.classList.remove('line-through', 'text-white/40');
                    text.classList.add('text-white');
                    box.classList.remove('bg-primary/30');
                    box.classList.add('bg-white/5');
                    box.innerHTML = '';
                } else {
                    text.classList.add('line-through', 'text-white/40');
                    text.classList.remove('text-white');
                    box.classList.add('bg-primary/30');
                    box.classList.remove('bg-white/5');
                    box.innerHTML = '<span class="material-symbols-outlined text-[16px] text-white font-bold">check</span>';
                }
            });
        });
</script>
